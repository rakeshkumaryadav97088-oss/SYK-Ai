<!DOCTYPE html>

    <style>

</head>
<body class="h-screen flex flex-col">

    <!-- Login Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#02050a] flex items-center justify-center p-6 transition-all duration-700">
        <div class="max-w-md w-full text-center space-y-12">
            <div class="relative inline-block p-12 bg-orange-600/10 rounded-[4rem] border border-orange-500/20 shadow-2xl">
                <i data-lucide="sun" class="w-24 h-24 text-yellow-500 fill-current"></i>
            </div>
            <div class="space-y-4">
                <h1 class="text-7xl font-black italic tracking-tighter">SYK AI</h1>
                <p class="text-orange-500 text-[10px] tracking-[1.5em] font-black uppercase">Shivam Yadav Edition</p>
            </div>
            <button id="login-btn" class="w-full bg-white text-black py-6 rounded-[2.5rem] font-black text-xs uppercase tracking-widest flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6" alt="G">
                प्रवेश करें
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="h-20 glass flex items-center justify-between px-8 shrink-0 z-40 border-b border-white/5">
        <div class="flex items-center gap-4">
            <button id="menu-btn" class="p-3 bg-orange-600/10 rounded-2xl text-orange-500"><i data-lucide="layout-grid"></i></button>
            <h2 class="text-2xl font-black italic tracking-tighter">SYK <span class="text-orange-500">PRO</span></h2>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-display" class="hidden sm:block text-[10px] font-black uppercase tracking-widest text-slate-500"></span>
            <button id="logout-btn" class="p-3 bg-red-500/10 text-red-500 rounded-2xl"><i data-lucide="power"></i></button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:relative z-50 w-80 h-full glass -translate-x-full lg:translate-x-0 transition-transform duration-500 flex flex-col">
            <div class="p-8 flex items-center justify-between">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">इतिहास और संग्रह</h3>
                <button id="close-sidebar" class="lg:hidden"><i data-lucide="x"></i></button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll"></div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col relative">
            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-12 pb-64 custom-scroll">
                <div class="h-full flex flex-col items-center justify-center opacity-10 space-y-6">
                    <i data-lucide="sparkles" class="w-20 h-20 text-orange-600"></i>
                    <p class="text-[11px] font-black uppercase tracking-[1.5em]">Neural Creative Studio</p>
                </div>
            </div>

            <!-- Advanced Input Bar -->
            <div class="absolute bottom-6 left-0 right-0 px-6 z-40">
                <div class="max-w-4xl mx-auto space-y-4">
                    
                    <!-- Size Controls (Arrow Triggered) -->
                    <div id="size-panel" class="hidden flex flex-wrap gap-2 p-4 glass rounded-3xl animate-in slide-in-from-bottom-2">
                        <button class="size-btn active" data-size="1:1">1:1 (Square)</button>
                        <button class="size-btn" data-size="16:9">16:9 (Youtube)</button>
                        <button class="size-btn" data-size="9:16">9:16 (Shorts)</button>
                        <button class="size-btn" data-size="A4">A4 Paper</button>
                        <button class="size-btn" data-size="4:6">4:6 Photo</button>
                        <button class="size-btn" data-size="A5">A5</button>
                        <button class="size-btn" data-size="A6">A6</button>
                    </div>

                    <div class="flex flex-col md:flex-row gap-3 glass p-3 rounded-[3rem] shadow-2xl">
                        <div class="flex items-center pl-4">
                            <button id="toggle-size" class="p-4 bg-white/5 rounded-full hover:bg-orange-600/20 text-orange-500 transition-all">
                                <i data-lucide="chevron-up" id="arrow-icon"></i>
                            </button>
                        </div>
                        <textarea id="prompt-input" placeholder="चित्र बनाने के लिए लिखें या कुछ पूछें..." class="flex-1 bg-transparent p-4 text-sm outline-none resize-none h-14 text-white placeholder-slate-700"></textarea>
                        <div class="flex gap-2 pr-2">
                            <button id="image-btn" class="w-14 h-14 bg-white/5 text-orange-500 rounded-full flex items-center justify-center hover:bg-white/10" title="चित्र बनाएं">
                                <i data-lucide="image"></i>
                            </button>
                            <button id="send-btn" class="w-14 h-14 king-gradient text-black rounded-full flex items-center justify-center shadow-xl">
                                <i data-lucide="send" class="w-6 h-6 ml-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf_eqSF0dNw2pvJw7jY43abayLF4ps2g8",
            authDomain: "syk-ai-e2005.firebaseapp.com",
            projectId: "syk-ai-e2005",
            storageBucket: "syk-ai-e2005.firebasestorage.app",
            messagingSenderId: "646362729227",
            appId: "1:646362729227:web:fa68bffdb2b017d42300e"
        };

        const API_KEY = "AIzaSyASW8VPcUu1L94FeQCOkGzKrmqZkC2wIk8";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentSize = "1:1";
        let lastUserPrompt = "";

        // UI Selectors
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const imageBtn = document.getElementById('image-btn');
        const sizePanel = document.getElementById('size-panel');
        const arrowIcon = document.getElementById('arrow-icon');

        // Toggle Sizes
        document.getElementById('toggle-size').onclick = () => {
            sizePanel.classList.toggle('hidden');
            arrowIcon.style.transform = sizePanel.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSize = btn.dataset.size;
            };
        });

        // Auth
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('user-display').innerText = user.displayName;
                syncHistory(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        // Chat & Image Generation
        async function runAI(type) {
            const prompt = promptInput.value.trim();
            if (!prompt) return;
            lastUserPrompt = prompt;
            promptInput.value = '';
            
            appendMessage('user', prompt);
            const loadingId = appendLoading();

            try {
                if (type === 'image') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ instances: { prompt: `${prompt}, high resolution, cinematic, professional photography, size ${currentSize}` }, parameters: { sampleCount: 1 } })
                    });
                    const data = await res.json();
                    const imgData = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    removeLoading(loadingId);
                    appendImage(imgData, prompt);
                    saveToCloud('image', prompt, imgData);
                } else {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "तुम SYK AI हो, शिवम यादव के शक्तिशाली एआई। महाराजा की तरह जवाब दो।" }] }
                        })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    removeLoading(loadingId);
                    appendMessage('bot', reply);
                    saveToCloud('chat', prompt, reply);
                }
            } catch (e) {
                removeLoading(loadingId);
                appendMessage('bot', "सिस्टम व्यस्त है, कृपया पुनः प्रयास करें।");
            }
        }

        sendBtn.onclick = () => runAI('chat');
        imageBtn.onclick = () => runAI('image');

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-500`;
            div.innerHTML = `
                <div class="p-6 rounded-[2.5rem] max-w-[85%] text-sm leading-relaxed ${role === 'user' ? 'king-gradient text-black font-bold' : 'glass text-slate-200'}">
                    ${text}
                    ${role === 'bot' ? `<div class="mt-4 flex gap-4 border-t border-white/5 pt-4"><button onclick="regenerateLast()" class="text-[9px] font-black uppercase text-orange-500 flex items-center gap-1"><i data-lucide="rotate-ccw" class="w-3 h-3"></i> फिर से</button></div>` : ''}
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        function appendImage(url, prompt) {
            const div = document.createElement('div');
            div.className = "flex justify-start animate-in zoom-in-95 duration-500";
            div.innerHTML = `
                <div class="glass p-4 rounded-[2.5rem] max-w-[90%] space-y-4">
                    <img src="${url}" class="rounded-3xl w-full object-contain shadow-2xl border border-white/10">
                    <div class="flex justify-between items-center px-2">
                        <p class="text-[10px] text-slate-500 italic truncate w-40">${prompt}</p>
                        <a href="${url}" download="SYK_AI_Image.png" class="p-3 bg-white text-black rounded-full"><i data-lucide="download" class="w-4 h-4"></i></a>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        function appendLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse";
            div.innerHTML = `<div class="glass p-6 rounded-full flex items-center gap-3"><div class="loader"></div><span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Processing...</span></div>`;
            chatContainer.appendChild(div);
            return id;
        }

        function removeLoading(id) { document.getElementById(id)?.remove(); }

        window.regenerateLast = () => {
            promptInput.value = lastUserPrompt;
            runAI('chat');
        };

        async function saveToCloud(type, p, r) {
            if (!auth.currentUser) return;
            await addDoc(collection(db, "users", auth.currentUser.uid, "history"), { type, p, r, time: Date.now() });
        }

        function syncHistory(uid) {
            const list = document.getElementById('history-list');
            onSnapshot(collection(db, "users", uid, "history"), (snap) => {
                list.innerHTML = '';
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = "p-4 glass rounded-2xl cursor-pointer hover:border-orange-500/50 transition-all";
                    el.innerHTML = `<p class="text-[10px] font-bold text-slate-500 truncate">${d.p}</p><p class="text-[8px] mt-1 text-orange-900 uppercase font-black">${d.type}</p>`;
                    el.onclick = () => { if(d.type === 'image') appendImage(d.r, d.p); else { appendMessage('user', d.p); appendMessage('bot', d.r); } };
                    list.prepend(el);
                });
            });
        }

        lucide.createIcons();
        document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.add('-translate-x-full');
    </script>
</body>
</html>
