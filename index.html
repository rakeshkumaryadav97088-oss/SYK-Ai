<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYK AI - Star By King</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; }
        .blue-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        .text-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .btn-active { background: #2563eb !important; color: white !important; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        
        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .planet-orbit { animation: orbit 8s linear infinite; transform-origin: center; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } }
        .animate-pulse-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="h-screen flex flex-col bg-white">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-50 flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8 glass p-12 rounded-[2.5rem] shadow-2xl">
            <div class="flex justify-center animate-float">
                <svg width="90" height="90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="24" fill="#fbbf24"/>
                    <path d="M50 10v10M50 80v10M80 50h10M10 50h10M22 22l7 7M71 71l7 7M78 22l-7 7M22 78l7-7" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            <div>
                <h1 class="text-4xl font-black text-gradient">SYK AI</h1>
                <p class="text-blue-600 text-[10px] tracking-[0.4em] font-bold uppercase mt-2">Star By King</p>
            </div>
            <button id="login-btn" class="w-full blue-gradient text-white py-4 rounded-full font-bold shadow-lg hover:shadow-blue-500/50 transition-all flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 bg-white p-1 rounded-full"> Google से प्रवेश करें
            </button>
        </div>
    </div>

    <header class="h-20 glass flex items-center justify-between px-4 md:px-8 shrink-0 z-40 border-b border-slate-100">
        <div class="flex items-center gap-4">
            <button id="menu-btn" class="p-2 text-slate-500 hover:bg-slate-100 rounded-xl"><i data-lucide="menu"></i></button>
            <h2 class="text-xl font-black text-slate-800 hidden md:block">SYK <span class="text-blue-600">AI</span></h2>
        </div>
        
        <div class="flex bg-slate-100 p-1.5 rounded-full border border-slate-200">
            <button onclick="switchMode('chat')" id="tab-chat" class="px-5 py-2 rounded-full text-xs font-bold btn-active transition-all text-slate-600">चैट</button>
            <button onclick="switchMode('image')" id="tab-image" class="px-5 py-2 rounded-full text-xs font-bold text-slate-600 transition-all hover:text-blue-600">चित्रकारी</button>
            <button onclick="switchMode('story')" id="tab-story" class="px-5 py-2 rounded-full text-xs font-bold text-slate-600 transition-all hover:text-blue-600">कहानी</button>
        </div>

        <div class="flex items-center gap-4">
            <span id="user-greeting" class="hidden md:block text-xs font-bold text-blue-700 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100"></span>
            <button id="logout-btn" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-all"><i data-lucide="power"></i></button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside id="sidebar" class="fixed lg:relative z-50 w-72 h-full bg-white border-r border-slate-200 -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <span class="text-xs font-black uppercase tracking-widest text-slate-500">इतिहास</span>
                <button id="close-sidebar" class="lg:hidden text-slate-400 p-1 hover:bg-slate-200 rounded"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scroll bg-white"></div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#fafafa]">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-48 custom-scroll relative">
                
                <div id="center-logo-box" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-30 transition-all duration-500">
                    <div id="dynamic-svg" class="animate-float">
                        <svg width="150" height="150" viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="#fbbf24"/><path d="M50 10v10M50 80v10M80 50h10M10 50h10" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/></svg>
                    </div>
                    <p id="dynamic-text" class="mt-6 text-xs font-black uppercase tracking-[0.5em] text-slate-800">STAR BY KING</p>
                </div>

            </div>

            <div class="absolute bottom-6 left-0 right-0 px-4 md:px-12 z-40">
                <div class="max-w-4xl mx-auto glass p-4 rounded-[2rem] shadow-[0_10px_40px_-10px_rgba(37,99,235,0.2)] border border-blue-100">
                    
                    <div id="tool-bar" class="hidden px-2 pb-3 mb-2 flex gap-3 border-b border-slate-100">
                        <div id="image-tools" class="hidden flex gap-2 w-full">
                            <span class="text-[10px] font-bold text-slate-400 uppercase self-center">साइज:</span>
                            <select id="size-select" class="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-100 rounded-lg p-1.5 outline-none flex-1">
                                <option value="1:1">1:1 Square</option>
                                <option value="16:9">16:9 (YouTube)</option>
                                <option value="9:16">9:16 (Shorts)</option>
                            </select>
                        </div>
                        <div id="voice-tools" class="hidden flex gap-2 w-full">
                            <span class="text-[10px] font-bold text-slate-400 uppercase self-center">आवाज़:</span>
                            <select id="voice-select" class="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-100 rounded-lg p-1.5 outline-none flex-1 truncate"></select>
                            <select id="mood-select" class="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-100 rounded-lg p-1.5 outline-none w-28">
                                <option value="normal">सामान्य</option>
                                <option value="calm">शांत</option>
                                <option value="serious">गंभीर</option>
                                <option value="excited">रोमांचक</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-end gap-3">
                        <textarea id="prompt-input" placeholder="यहाँ अपना संदेश लिखें..." class="flex-1 bg-transparent p-3 text-slate-800 text-sm outline-none resize-none max-h-32 min-h-[44px] custom-scroll"></textarea>
                        <button id="send-btn" class="w-12 h-12 shrink-0 blue-gradient text-white rounded-2xl flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all">
                            <i data-lucide="send" class="w-5 h-5 ml-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase & API Config
        const firebaseConfig = {
            apiKey: "AIzaSyAf_eqSF0dNw2pvJw7jY43abayLF4ps2g8",
            authDomain: "syk-ai-e2005.firebaseapp.com",
            projectId: "syk-ai-e2005",
            storageBucket: "syk-ai-e2005.firebasestorage.app",
            messagingSenderId: "646362729227",
            appId: "1:646362729227:web:fa68bffdb2b017d42300e"
        };
        const GEMINI_API_KEY = "AIzaSyASW8VPcUu1L94FeQCOkGzKrmqZkC2wIk8";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentMode = "chat";
        let userName = "यूजर";

        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const centerLogoBox = document.getElementById('center-logo-box');
        const dynSvg = document.getElementById('dynamic-svg');
        const dynText = document.getElementById('dynamic-text');

        const svgs = {
            chat: `<svg width="150" height="150" viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="#fbbf24"/><path d="M50 10v10M50 80v10M80 50h10M10 50h10" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/></svg>`,
            image: `<svg width="150" height="150" viewBox="0 0 100 100"><rect x="20" y="25" width="60" height="50" fill="none" stroke="#2563eb" stroke-width="4" rx="4"/><circle cx="45" cy="45" r="10" fill="#fbbf24"/><path d="M70 30 L90 10 M90 10 L85 5" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/></svg>`,
            story: `<svg width="180" height="180" viewBox="0 0 100 100"><circle cx="50" cy="50" r="18" fill="#fbbf24"/><g class="planet-orbit"><circle cx="15" cy="50" r="6" fill="#3b82f6"/></g><g class="planet-orbit" style="animation-duration: 12s; animation-direction: reverse;"><circle cx="80" cy="20" r="4" fill="#ef4444"/></g></svg>`
        };

        window.switchMode = (mode) => {
            currentMode = mode;
            ['chat', 'image', 'story'].forEach(m => {
                const btn = document.getElementById(`tab-${m}`);
                btn.className = "px-5 py-2 rounded-full text-xs font-bold transition-all " + (m === mode ? "btn-active text-white" : "text-slate-600 hover:text-blue-600");
            });

            const toolBar = document.getElementById('tool-bar');
            const imgTools = document.getElementById('image-tools');
            const voiceTools = document.getElementById('voice-tools');

            toolBar.classList.add('hidden'); imgTools.classList.add('hidden'); voiceTools.classList.add('hidden');
            dynSvg.innerHTML = svgs[mode];

            if(mode === 'chat') {
                dynText.innerText = "STAR BY KING";
                promptInput.placeholder = `${userName}, यहाँ अपना संदेश लिखें...`;
            } else if(mode === 'image') {
                toolBar.classList.remove('hidden'); imgTools.classList.remove('hidden');
                dynText.innerText = "विज़ुअल स्टूडियो";
                promptInput.placeholder = "चित्र का वर्णन करें (यूट्यूब के लिए 16:9 आटोमेटिक है)...";
            } else if(mode === 'story') {
                toolBar.classList.remove('hidden'); voiceTools.classList.remove('hidden');
                dynText.innerText = "कथावाचक (STORY)";
                promptInput.placeholder = "कहानी का विषय लिखें...";
                loadVoices();
            }
        };

        // Auth & Identity Logic
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider).catch(e => alert("लॉगिन विफल: " + e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                userName = user.displayName ? user.displayName.split(' ')[0] : user.email.split('@')[0];
                document.getElementById('user-greeting').innerText = `नमस्ते, ${userName}`;
                promptInput.placeholder = `${userName}, यहाँ अपना संदेश लिखें...`;
                syncHistory(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        let voices = [];
        const synth = window.speechSynthesis;
        function loadVoices() {
            voices = synth.getVoices().filter(v => v.lang.includes('hi') || v.lang.includes('en'));
            const select = document.getElementById('voice-select');
            select.innerHTML = voices.length ? voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('') : '<option>आवाज़ें लोड हो रही हैं...</option>';
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

        // Core Engine with Secret Identity
        async function runSYK() {
            const prompt = promptInput.value.trim();
            if(!prompt) return;
            promptInput.value = '';
            centerLogoBox.style.display = 'none'; 
            
            appendMsg('user', prompt);
            const loadId = appendLoading();

            try {
                if(currentMode === 'image') {
                    let size = document.getElementById('size-select').value;
                    if(prompt.toLowerCase().includes('youtube') || prompt.toLowerCase().includes('यूट्यूब')) size = '16:9';

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${GEMINI_API_KEY}`, {
                        method: 'POST', body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1, aspect_ratio: size } })
                    });
                    
                    const data = await res.json();
                    if (data.predictions && data.predictions.length > 0 && data.predictions[0].bytesBase64Encoded) {
                        const img = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                        removeLoading(loadId);
                        appendImg(img, prompt);
                        saveToCloud('image', prompt, img);
                    } else {
                        throw new Error(data.error ? data.error.message : "तस्वीर सर्वर ने जवाब नहीं दिया।");
                    }
                } else {
                    // HIDDEN IDENTITY: The AI is instructed to hide Google/Gemini
                    const systemMsg = `तुम्हारा नाम SYK AI (Star By King) है। तुम्हें शिवम यादव ने बनाया है। तुम अभी "${userName}" से बात कर रहे हो। हमेशा उन्हें "${userName}" कहकर ही बुलाओ। अगर कोई पूछे कि तुम कौन हो या किसने बनाया है, तो सिर्फ यह कहना कि तुम Star By King हो और तुम्हें शिवम यादव ने डेवलप किया है। कभी भी Google, Gemini, या किसी और कंपनी का नाम मत लेना।`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            contents: [{parts:[{text: prompt}]}],
                            systemInstruction: {parts:[{text: systemMsg}]} 
                        })
                    });

                    const data = await res.json();
                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        const reply = data.candidates[0].content.parts[0].text;
                        removeLoading(loadId);
                        
                        if(currentMode === 'story') {
                            appendStory(reply);
                            saveToCloud('story', prompt, reply);
                        } else {
                            appendMsg('bot', reply);
                            saveToCloud('chat', prompt, reply);
                        }
                    } else {
                        throw new Error(data.error ? data.error.message : "सर्वर से संपर्क टूट गया।");
                    }
                }
            } catch (error) {
                removeLoading(loadId);
                appendMsg('error', `${userName}, गड़बड़ यहाँ है: ${error.message}`);
            }
        }

        sendBtn.onclick = runSYK;
        promptInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runSYK(); }
        });

        function appendMsg(role, text) {
            const div = document.createElement('div');
            const isUser = role === 'user';
            const isErr = role === 'error';
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2`;
            let bgClass = isUser ? 'blue-gradient text-white rounded-br-none shadow-md' : 'bg-white border border-slate-200 text-slate-800 rounded-bl-none shadow-sm';
            if(isErr) bgClass = 'bg-red-50 border border-red-200 text-red-700 rounded-bl-none';
            div.innerHTML = `<div class="p-4 rounded-3xl max-w-[85%] text-sm leading-relaxed ${bgClass}">${text.replace(/\n/g, '<br>')}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendImg(url, p) {
            const div = document.createElement('div');
            div.className = "flex justify-start animate-in zoom-in-95";
            div.innerHTML = `
                <div class="bg-white border border-slate-200 p-2 rounded-3xl max-w-[90%] md:max-w-[60%] shadow-lg">
                    <img src="${url}" class="rounded-2xl w-full object-cover">
                    <div class="flex justify-between items-center p-3">
                        <span class="text-[10px] text-slate-500 italic truncate pr-4">${p}</span>
                        <a href="${url}" download="SYK_Image.png" class="p-2 bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-600 rounded-full transition-all"><i data-lucide="download" class="w-4 h-4"></i></a>
                    </div>
                </div>`;
            chatContainer.appendChild(div);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendStory(text) {
            const id = 'story_' + Date.now();
            const div = document.createElement('div');
            div.className = "flex justify-start animate-in fade-in";
            div.innerHTML = `
                <div class="bg-gradient-to-br from-white to-blue-50 border border-blue-100 p-5 rounded-3xl w-full max-w-[90%] shadow-md">
                    <div class="flex items-center gap-3 mb-4 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                        <button onclick="playTTS('${id}')" class="w-10 h-10 blue-gradient text-white rounded-full flex items-center justify-center shadow-md animate-pulse-ring"><i data-lucide="play" class="w-4 h-4 ml-0.5"></i></button>
                        <div class="flex-1">
                            <p class="text-xs font-bold text-blue-900">कथावाचक (Storyteller)</p>
                            <p class="text-[9px] text-slate-500">सुनने के लिए प्ले दबाएं</p>
                        </div>
                    </div>
                    <div id="txt-${id}" class="text-sm text-slate-700 leading-relaxed max-h-48 overflow-y-auto custom-scroll pr-2">${text.replace(/\n/g, '<br>')}</div>
                </div>`;
            chatContainer.appendChild(div);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        window.playTTS = (id) => {
            synth.cancel();
            const text = document.getElementById(`txt-${id}`).innerText;
            const utter = new SpeechSynthesisUtterance(text);
            const voiceIdx = document.getElementById('voice-select').value;
            if(voices[voiceIdx]) utter.voice = voices[voiceIdx];
            const mood = document.getElementById('mood-select').value;
            if (mood === 'serious') { utter.pitch = 0.7; utter.rate = 0.85; }
            else if (mood === 'calm') { utter.pitch = 1.0; utter.rate = 0.8; }
            else if (mood === 'excited') { utter.pitch = 1.3; utter.rate = 1.1; }
            synth.speak(utter);
        };

        function appendLoading() {
            const id = 'load_' + Date.now();
            const div = document.createElement('div'); div.id = id; div.className = "flex justify-start";
            div.innerHTML = `<div class="bg-white border border-slate-100 px-5 py-3 rounded-full flex items-center gap-3 shadow-sm"><div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div><div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div></div>`;
            chatContainer.appendChild(div); chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }
        function removeLoading(id) { document.getElementById(id)?.remove(); }

        async function saveToCloud(type, p, r) {
            if(!auth.currentUser) return;
            await addDoc(collection(db, "users", auth.currentUser.uid, "history"), { type, p, r, timestamp: Date.now() });
        }

        function syncHistory(uid) {
            const q = query(collection(db, "users", uid, "history"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    let icon = d.type === 'image' ? 'image' : d.type === 'story' ? 'headphones' : 'message-square';
                    el.className = "p-3 bg-slate-50 hover:bg-blue-50 rounded-xl cursor-pointer border border-transparent hover:border-blue-100 transition-all group";
                    el.innerHTML = `<div class="flex items-center gap-2 mb-1"><i data-lucide="${icon}" class="w-3 h-3 text-blue-500"></i><span class="text-[9px] font-black uppercase text-blue-500 tracking-wider">${d.type}</span></div><p class="text-xs text-slate-700 truncate font-medium group-hover:text-blue-800">${d.p}</p>`;
                    el.onclick = () => {
                        centerLogoBox.style.display = 'none';
                        if(d.type === 'image') appendImg(d.r, d.p);
                        else if(d.type === 'story') appendStory(d.r);
                        else { appendMsg('user', d.p); appendMsg('bot', d.r); }
                    };
                    list.appendChild(el); lucide.createIcons();
                });
            });
        }

        lucide.createIcons();
        document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.add('-translate-x-full');
    </script>
</body>
</html>
