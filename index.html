<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYK AI - Star By King</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); }
        .blue-gradient { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); }
        .text-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
        .btn-active { background: #2563eb; color: white; }
        .loader { border: 3px solid rgba(59, 130, 246, 0.2); border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Sun Animations */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @keyframes orbit { from { transform: rotate(0deg) translateX(40px) rotate(0deg); } to { transform: rotate(360deg) translateX(40px) rotate(-360deg); } }
        .planet { animation: orbit 5s linear infinite; }
        .planet-2 { animation: orbit 7s linear infinite reverse; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6 transition-all duration-700">
        <div class="max-w-md w-full text-center space-y-8 glass p-10 rounded-[3rem]">
            <div id="login-logo" class="flex justify-center animate-float">
                <svg width="100" height="100" viewBox="0 0 100 100" class="text-blue-500 fill-current"><circle cx="50" cy="50" r="25" fill="#facc15"/><path d="M50 10v10m0 60v10m30-40h10M10 50h10m22-22l7 7m-35 35l7 7m42-42l-7 7m-14 28l7 7" stroke="#facc15" stroke-width="4" stroke-linecap="round"/></svg>
            </div>
            <div>
                <h1 class="text-5xl font-black text-gradient tracking-tight">SYK AI</h1>
                <p class="text-blue-500 text-xs tracking-[0.5em] font-bold uppercase mt-2">Star By King</p>
            </div>
            <button id="login-btn" class="w-full bg-white border-2 border-blue-100 text-slate-800 py-4 rounded-full font-bold shadow-lg hover:border-blue-500 transition-all flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5" alt="G"> प्रवेश करें
            </button>
        </div>
    </div>

    <header class="h-20 glass flex items-center justify-between px-6 shrink-0 z-40 relative">
        <div class="flex items-center gap-4">
            <button id="menu-btn" class="p-2 text-blue-600 hover:bg-blue-50 rounded-xl"><i data-lucide="menu"></i></button>
            <h2 class="text-2xl font-black text-gradient">SYK <span class="text-blue-500">PRO</span></h2>
        </div>
        
        <div class="absolute left-1/2 -translate-x-1/2 flex bg-blue-50/50 p-1 rounded-full border border-blue-100">
            <button onclick="switchMode('chat')" id="tab-chat" class="px-6 py-2 rounded-full text-sm font-bold btn-active transition-all">बातचीत</button>
            <button onclick="switchMode('image')" id="tab-image" class="px-6 py-2 rounded-full text-sm font-bold text-slate-500 transition-all hover:text-blue-600">चित्रकारी</button>
            <button onclick="switchMode('story')" id="tab-story" class="px-6 py-2 rounded-full text-sm font-bold text-slate-500 transition-all hover:text-blue-600">कहानी (आवाज़)</button>
        </div>

        <div class="flex items-center gap-3">
            <button id="logout-btn" class="p-2 text-red-500 hover:bg-red-50 rounded-xl"><i data-lucide="log-out"></i></button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside id="sidebar" class="fixed lg:relative z-50 w-72 h-full glass -translate-x-full lg:translate-x-0 transition-transform duration-500 flex flex-col border-r border-blue-50">
            <div class="p-6 flex items-center justify-between border-b border-blue-50">
                <h3 class="text-xs font-black text-blue-800 uppercase tracking-widest">इतिहास</h3>
                <button id="close-sidebar" class="lg:hidden text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scroll"></div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-white">
            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 pb-72 custom-scroll">
                
                <div class="h-full flex flex-col items-center justify-center opacity-40 space-y-6" id="dynamic-logo-container">
                    <svg id="logo-chat" width="150" height="150" viewBox="0 0 100 100" class="animate-float text-blue-500 fill-current"><circle cx="50" cy="50" r="25" fill="#facc15"/><path d="M50 5v15m0 60v15m35-40h15M5 50h15m17-25l10 10m-35 35l10 10m42-42l-10 10m-14 28l10 10" stroke="#facc15" stroke-width="4" stroke-linecap="round"/></svg>
                    
                    <p id="logo-text" class="text-sm font-black uppercase tracking-[0.5em] text-blue-800">शाही दरबार</p>
                </div>

            </div>

            <div class="absolute bottom-6 left-0 right-0 px-6 z-40">
                <div class="max-w-4xl mx-auto space-y-3 glass p-4 rounded-[2rem] shadow-2xl border border-blue-100">
                    
                    <div id="image-tools" class="hidden flex flex-wrap gap-2 pb-3 border-b border-blue-50 mb-2">
                        <span class="text-xs font-bold text-blue-800 mr-2 flex items-center">साइज:</span>
                        <button class="size-btn px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold border border-blue-200 active-size" data-size="1:1">1:1</button>
                        <button class="size-btn px-3 py-1 hover:bg-blue-50 text-slate-500 rounded-lg text-xs font-bold border border-transparent" data-size="16:9">16:9 YouTube</button>
                        <button class="size-btn px-3 py-1 hover:bg-blue-50 text-slate-500 rounded-lg text-xs font-bold border border-transparent" data-size="9:16">9:16 Shorts</button>
                    </div>

                    <div id="voice-tools" class="hidden flex flex-wrap gap-3 pb-3 border-b border-blue-50 mb-2">
                        <select id="voice-select" class="bg-blue-50 text-blue-800 text-xs font-bold p-2 rounded-lg outline-none border border-blue-200 w-48 truncate"></select>
                        <select id="mood-select" class="bg-blue-50 text-blue-800 text-xs font-bold p-2 rounded-lg outline-none border border-blue-200">
                            <option value="normal">सामान्य मूड</option>
                            <option value="serious">गंभीर (Serious)</option>
                            <option value="calm">शांत (Calm)</option>
                            <option value="calm_serious">शांत और गंभीर</option>
                            <option value="excited">उत्साहित (Excited)</option>
                        </select>
                    </div>

                    <div class="flex items-end gap-3">
                        <textarea id="prompt-input" placeholder="महाराज, अपना आदेश दें..." class="flex-1 bg-transparent p-3 text-slate-800 outline-none resize-none max-h-32 min-h-[50px] custom-scroll"></textarea>
                        <button id="send-btn" class="w-12 h-12 shrink-0 blue-gradient text-white rounded-2xl flex items-center justify-center shadow-lg hover:shadow-blue-500/30 transition-all">
                            <i data-lucide="send" class="w-5 h-5 ml-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf_eqSF0dNw2pvJw7jY43abayLF4ps2g8",
            authDomain: "syk-ai-e2005.firebaseapp.com",
            projectId: "syk-ai-e2005",
            storageBucket: "syk-ai-e2005.firebasestorage.app",
            messagingSenderId: "646362729227",
            appId: "1:646362729227:web:fa68bffdb2b017d42300e"
        };
        const API_KEY = "AIzaSyASW8VPcUu1L94FeQCOkGzKrmqZkC2wIk8";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentMode = "chat";
        let currentSize = "1:1";
        let lastUserPrompt = "";

        // UI Elements
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const logoContainer = document.getElementById('dynamic-logo-container');

        // Dynamic SVGs
        const svgChat = `<svg width="150" height="150" viewBox="0 0 100 100" class="animate-float text-blue-500 fill-current"><circle cx="50" cy="50" r="25" fill="#facc15"/><path d="M50 5v15m0 60v15m35-40h15M5 50h15m17-25l10 10m-35 35l10 10m42-42l-10 10m-14 28l10 10" stroke="#facc15" stroke-width="4" stroke-linecap="round"/></svg>`;
        const svgImage = `<svg width="150" height="150" viewBox="0 0 100 100" class="animate-float"><rect x="20" y="20" width="60" height="50" fill="none" stroke="#3b82f6" stroke-width="4"/><path d="M30 70 L20 90 M70 70 L80 90" stroke="#3b82f6" stroke-width="4"/><circle cx="50" cy="45" r="15" fill="#facc15"/><path d="M60 60 L85 20" stroke="#1e3a8a" stroke-width="5" stroke-linecap="round"/><circle cx="85" cy="20" r="3" fill="#ef4444"/></svg>`;
        const svgStory = `<svg width="180" height="180" viewBox="0 0 150 150" class="animate-float"><circle cx="75" cy="75" r="20" fill="#facc15"/><circle cx="40" cy="75" r="5" fill="#3b82f6" class="planet"/><circle cx="110" cy="75" r="8" fill="#ef4444" class="planet-2"/><circle cx="75" cy="30" r="4" fill="#10b981" class="planet"/><path d="M55 75 Q75 95 95 75" fill="none" stroke="#facc15" stroke-width="2"/></svg>`;

        // Tab Switching Logic
        window.switchMode = (mode) => {
            currentMode = mode;
            ['chat', 'image', 'story'].forEach(m => {
                document.getElementById(`tab-${m}`).className = "px-6 py-2 rounded-full text-sm font-bold text-slate-500 transition-all hover:text-blue-600";
            });
            document.getElementById(`tab-${mode}`).className = "px-6 py-2 rounded-full text-sm font-bold btn-active transition-all";
            
            document.getElementById('image-tools').classList.add('hidden');
            document.getElementById('voice-tools').classList.add('hidden');
            
            if(mode === 'chat') {
                logoContainer.innerHTML = svgChat + `<p class="text-sm font-black uppercase tracking-[0.5em] text-blue-800 mt-4">शाही दरबार</p>`;
                promptInput.placeholder = "महाराज, अपना आदेश दें...";
            } else if(mode === 'image') {
                document.getElementById('image-tools').classList.remove('hidden');
                logoContainer.innerHTML = svgImage + `<p class="text-sm font-black uppercase tracking-[0.5em] text-blue-800 mt-4">विज़ुअल स्टूडियो</p>`;
                promptInput.placeholder = "चित्र कैसा बनाना है, वर्णन करें...";
            } else if(mode === 'story') {
                document.getElementById('voice-tools').classList.remove('hidden');
                logoContainer.innerHTML = svgStory + `<p class="text-sm font-black uppercase tracking-[0.5em] text-blue-800 mt-4">कहानी और आवाज़</p>`;
                promptInput.placeholder = "अपनी कहानी या टेक्स्ट लिखें जिसे आवाज़ में बदलना है...";
                loadVoices();
            }
        };

        // Image Size Selection
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.size-btn').forEach(b => {
                    b.classList.remove('active-size', 'bg-blue-50', 'text-blue-600', 'border-blue-200');
                    b.classList.add('text-slate-500', 'border-transparent');
                });
                btn.classList.add('active-size', 'bg-blue-50', 'text-blue-600', 'border-blue-200');
                btn.classList.remove('text-slate-500', 'border-transparent');
                currentSize = btn.dataset.size;
            };
        });

        // Speech Synthesis Setup (TTS)
        const synth = window.speechSynthesis;
        let voices = [];
        function loadVoices() {
            voices = synth.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            voiceSelect.innerHTML = '';
            voices.forEach((voice, i) => {
                // Showing top voices, filtering for Hindi/English to keep it clean
                if(voice.lang.includes('hi') || voice.lang.includes('en')) {
                    const option = document.createElement('option');
                    option.textContent = `${voice.name} (${voice.lang})`;
                    option.value = i;
                    voiceSelect.appendChild(option);
                }
            });
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Auth Logic
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                syncHistory(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        // Main AI Function
        async function runAI() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;
            lastUserPrompt = prompt;
            promptInput.value = '';
            
            appendMessage('user', prompt);
            const loadingId = appendLoading();

            try {
                if (currentMode === 'image') {
                    // Smart Youtube Size Logic
                    let finalSize = currentSize;
                    if(prompt.toLowerCase().includes("youtube") || prompt.toLowerCase().includes("यूट्यूब")) finalSize = "16:9";

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            instances: [{ prompt: `${prompt}, high quality, beautiful lighting` }], 
                            parameters: { sampleCount: 1, aspect_ratio: finalSize } 
                        })
                    });
                    const data = await res.json();
                    const imgData = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    removeLoading(loadingId);
                    appendImage(imgData, prompt);
                    saveToCloud('image', prompt, imgData);
                } 
                else if (currentMode === 'chat' || currentMode === 'story') {
                    // Gemini Flash Call
                    const systemPrompt = "तुम्हारा नाम SYK AI है, जिसका मतलब है 'Star By King'। तुम शिवम यादव द्वारा बनाए गए एक शक्तिशाली एआई हो। हमेशा एक महाराजा की तरह शाही अंदाज़ में जवाब दो। अपनी पहचान सिर्फ 'Star By King' बताओ। कभी भी गूगल या जेमिनी का जिक्र मत करना। अगर कहानी लिखने को कहा जाए, तो बेहतरीन किस्सागोई का इस्तेमाल करो।";
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    removeLoading(loadingId);
                    
                    if(currentMode === 'story') {
                        appendStoryMessage(reply);
                        saveToCloud('story', prompt, reply);
                    } else {
                        appendMessage('bot', reply);
                        saveToCloud('chat', prompt, reply);
                    }
                }
            } catch (e) {
                removeLoading(loadingId);
                appendMessage('bot', "महाराज, सिस्टम अभी व्यस्त है। कृपया पुनः प्रयास करें।");
            }
        }

        sendBtn.onclick = runAI;

        // UI Appenders
        function appendMessage(role, text) {
            document.getElementById('dynamic-logo-container').style.display = 'none';
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-500`;
            div.innerHTML = `
                <div class="p-5 rounded-3xl max-w-[85%] text-sm leading-relaxed shadow-sm ${role === 'user' ? 'bg-blue-600 text-white font-medium rounded-br-none' : 'glass text-slate-800 rounded-bl-none'}">
                    ${text.replace(/\n/g, '<br>')}
                    ${role === 'bot' ? `<div class="mt-3 pt-3 border-t border-slate-200/50 flex gap-4"><button onclick="regenerateLast()" class="text-[10px] font-bold uppercase text-blue-600 flex items-center gap-1 hover:text-blue-800"><i data-lucide="rotate-ccw" class="w-3 h-3"></i> फिर से</button></div>` : ''}
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        function appendImage(url, prompt) {
            document.getElementById('dynamic-logo-container').style.display = 'none';
            const div = document.createElement('div');
            div.className = "flex justify-start animate-in zoom-in-95 duration-500";
            div.innerHTML = `
                <div class="glass p-3 rounded-3xl max-w-[90%] space-y-3 shadow-lg border border-blue-50">
                    <img src="${url}" class="rounded-2xl w-full object-contain bg-slate-100">
                    <div class="flex justify-between items-center px-2">
                        <p class="text-[10px] text-slate-500 italic truncate w-48">${prompt}</p>
                        <a href="${url}" download="SYK_AI_Image.png" class="p-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md"><i data-lucide="download" class="w-4 h-4"></i></a>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        function appendStoryMessage(text) {
            document.getElementById('dynamic-logo-container').style.display = 'none';
            const id = 'story-' + Date.now();
            const div = document.createElement('div');
            div.className = "flex justify-start animate-in fade-in duration-500";
            div.innerHTML = `
                <div class="glass p-6 rounded-3xl max-w-[90%] shadow-lg border-l-4 border-l-blue-500 w-full">
                    <div class="flex items-center gap-3 mb-4 bg-blue-50 p-3 rounded-xl">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-blue-600"><i data-lucide="mic"></i></div>
                        <div class="flex-1">
                            <p class="text-xs font-bold text-blue-800">आवाज़ जनरेटर</p>
                            <p class="text-[10px] text-slate-500">कहानी तैयार है, प्ले करें</p>
                        </div>
                        <button onclick="playTTS('${id}')" class="p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md"><i data-lucide="play" class="w-4 h-4"></i></button>
                        <button onclick="downloadTTS('${id}')" class="p-3 bg-white text-blue-600 border border-blue-100 rounded-full hover:bg-blue-50 shadow-sm" title="ऑडियो डाउनलोड करें"><i data-lucide="download" class="w-4 h-4"></i></button>
                    </div>
                    <div class="text-sm text-slate-700 leading-relaxed max-h-40 overflow-y-auto custom-scroll pr-2" id="text-${id}">${text.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        // Text to Speech Logic (With Moods)
        window.playTTS = (id) => {
            const text = document.getElementById(`text-${id}`).innerText;
            const utterThis = new SpeechSynthesisUtterance(text);
            
            const selectedVoiceIndex = document.getElementById('voice-select').value;
            if(selectedVoiceIndex) utterThis.voice = voices[selectedVoiceIndex];

            const mood = document.getElementById('mood-select').value;
            if (mood === 'serious') { utterThis.pitch = 0.7; utterThis.rate = 0.85; }
            else if (mood === 'calm') { utterThis.pitch = 1.0; utterThis.rate = 0.8; }
            else if (mood === 'calm_serious') { utterThis.pitch = 0.8; utterThis.rate = 0.8; }
            else if (mood === 'excited') { utterThis.pitch = 1.2; utterThis.rate = 1.1; }
            
            synth.cancel(); // Stop any playing audio
            synth.speak(utterThis);
        };

        // Download Audio Logic (Recording TTS output)
        window.downloadTTS = (id) => {
            alert("महाराज, वेब ब्राउज़र सीधे आवाज़ को MP3 में डाउनलोड करने की अनुमति नहीं देता। आवाज़ रिकॉर्ड करने के लिए कृपया अपने डिवाइस के 'Screen Recorder' या 'Audio Recorder' का उपयोग करें। प्ले बटन दबाते ही रिकॉर्डिंग शुरू कर लें।");
            playTTS(id);
        };

        function appendLoading() {
            document.getElementById('dynamic-logo-container').style.display = 'none';
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse";
            div.innerHTML = `<div class="bg-blue-50 p-4 rounded-full flex items-center gap-3 border border-blue-100"><div class="loader"></div><span class="text-[10px] font-black uppercase tracking-widest text-blue-600">Star is thinking...</span></div>`;
            chatContainer.appendChild(div);
            return id;
        }

        function removeLoading(id) { document.getElementById(id)?.remove(); }

        window.regenerateLast = () => {
            promptInput.value = lastUserPrompt;
            runAI();
        };

        async function saveToCloud(type, p, r) {
            if (!auth.currentUser) return;
            await addDoc(collection(db, "users", auth.currentUser.uid, "history"), { type, p, r, time: Date.now() });
        }

        function syncHistory(uid) {
            const list = document.getElementById('history-list');
            onSnapshot(collection(db, "users", uid, "history"), (snap) => {
                list.innerHTML = '';
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = "p-3 bg-white border border-slate-100 rounded-xl cursor-pointer hover:border-blue-300 transition-all shadow-sm";
                    el.innerHTML = `<p class="text-xs font-bold text-slate-700 truncate">${d.p}</p><p class="text-[9px] mt-1 text-blue-500 uppercase font-bold flex items-center gap-1"><i data-lucide="${d.type === 'image' ? 'image' : d.type === 'story' ? 'mic' : 'message-circle'}" class="w-3 h-3"></i> ${d.type}</p>`;
                    el.onclick = () => { 
                        if(d.type === 'image') appendImage(d.r, d.p); 
                        else if(d.type === 'story') appendStoryMessage(d.r);
                        else { appendMessage('user', d.p); appendMessage('bot', d.r); } 
                    };
                    list.prepend(el);
                    lucide.createIcons();
                });
            });
        }

        lucide.createIcons();
        document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.add('-translate-x-full');
    </script>
</body>
</html>
