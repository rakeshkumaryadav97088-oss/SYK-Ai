<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYK AI - Star By King</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .btn-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        
        /* Dynamic Animations */
        @keyframes sun-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-sun { animation: sun-float 3s ease-in-out infinite; }
        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .orbit-slow { animation: rotate-slow 10s linear infinite; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div class="text-center space-y-8 p-12 border border-slate-100 rounded-[3rem] shadow-xl">
            <div class="flex justify-center animate-sun">
                <svg width="80" height="80" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="25" fill="#fbbf24"/>
                    <path d="M50 10v10M50 80v10M80 50h10M10 50h10" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-4xl font-black tracking-tighter text-slate-900">SYK AI <span class="text-blue-600">PRO</span></h1>
            <button id="login-btn" class="w-full blue-gradient text-white py-4 rounded-full font-bold shadow-lg hover:opacity-90 transition-all flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 bg-white rounded-full p-0.5"> Google से प्रवेश करें
            </button>
        </div>
    </div>

    <header class="h-20 glass flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-3">
            <button id="menu-btn" class="p-2 text-slate-600"><i data-lucide="menu"></i></button>
            <h2 class="text-xl font-black tracking-tight text-slate-800">SYK <span class="text-blue-600">AI</span></h2>
        </div>
        
        <div class="flex bg-slate-100 p-1 rounded-full border border-slate-200">
            <button onclick="switchMode('chat')" id="tab-chat" class="px-5 py-2 rounded-full text-xs font-bold btn-active transition-all">चैट</button>
            <button onclick="switchMode('image')" id="tab-image" class="px-5 py-2 rounded-full text-xs font-bold text-slate-500 transition-all">चित्रकारी</button>
            <button onclick="switchMode('story')" id="tab-story" class="px-5 py-2 rounded-full text-xs font-bold text-slate-500 transition-all">कहानी</button>
        </div>

        <div class="flex items-center gap-3">
            <span id="user-name-display" class="hidden md:block text-xs font-bold text-blue-600"></span>
            <button id="logout-btn" class="p-2 text-red-500"><i data-lucide="power"></i></button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside id="sidebar" class="fixed lg:relative z-[60] w-72 h-full bg-white border-r border-slate-100 -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">इतिहास</span>
                <button id="close-sidebar" class="lg:hidden"><i data-lucide="x"></i></button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scroll"></div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#fcfcfc]">
            <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 pb-40 custom-scroll relative">
                
                <div id="logo-center" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-20">
                    <div id="logo-svg-container" class="animate-sun">
                        <svg width="120" height="120" viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="#fbbf24"/><path d="M50 10v10M50 80v10M80 50h10M10 50h10" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/></svg>
                    </div>
                    <p id="logo-subtext" class="text-[10px] font-black uppercase tracking-[1em] text-blue-900 mt-4">Star By King</p>
                </div>

            </div>

            <div class="p-6">
                <div class="max-w-4xl mx-auto glass p-3 rounded-[2.5rem] shadow-2xl border border-blue-50">
                    
                    <div id="extra-tools" class="px-4 pb-2 flex gap-4 hidden">
                        <div id="voice-options" class="flex gap-2">
                            <select id="voice-select" class="text-[10px] font-bold bg-slate-50 p-1 rounded border"></select>
                            <select id="mood-select" class="text-[10px] font-bold bg-slate-50 p-1 rounded border">
                                <option value="1.0">शांत</option>
                                <option value="0.7">गंभीर</option>
                                <option value="1.2">रोमांचक</option>
                            </select>
                        </div>
                        <div id="image-options" class="hidden">
                            <select id="size-select" class="text-[10px] font-bold bg-slate-50 p-1 rounded border">
                                <option value="1:1">1:1 Square</option>
                                <option value="16:9">16:9 YouTube</option>
                                <option value="9:16">9:16 Shorts</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <textarea id="prompt-input" placeholder="शिवम, यहाँ लिखें..." rows="1" class="flex-1 bg-transparent p-3 text-sm outline-none resize-none"></textarea>
                        <button id="send-btn" class="w-12 h-12 blue-gradient text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                            <i data-lucide="send" class="w-5 h-5 ml-0.5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf_eqSF0dNw2pvJw7jY43abayLF4ps2g8",
            authDomain: "syk-ai-e2005.firebaseapp.com",
            projectId: "syk-ai-e2005",
            storageBucket: "syk-ai-e2005.firebasestorage.app",
            messagingSenderId: "646362729227",
            appId: "1:646362729227:web:fa68bffdb2b017d42300e"
        };
        const GEMINI_KEY = "AIzaSyASW8VPcUu1L94FeQCOkGzKrmqZkC2wIk8";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentMode = "chat";
        let userName = "शिवम";

        // UI Handlers
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const logoSvg = document.getElementById('logo-svg-container');

        // Mode Switching
        window.switchMode = (mode) => {
            currentMode = mode;
            document.querySelectorAll('header button').forEach(b => b.classList.remove('btn-active', 'text-slate-500'));
            document.getElementById(`tab-${mode}`).classList.add('btn-active');
            
            document.getElementById('extra-tools').classList.remove('hidden');
            document.getElementById('voice-options').classList.add('hidden');
            document.getElementById('image-options').classList.add('hidden');

            if(mode === 'chat') {
                document.getElementById('extra-tools').classList.add('hidden');
                logoSvg.innerHTML = `<svg width="120" height="120" viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="#fbbf24"/><path d="M50 10v10M50 80v10M80 50h10M10 50h10" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/></svg>`;
            } else if(mode === 'image') {
                document.getElementById('image-options').classList.remove('hidden');
                logoSvg.innerHTML = `<svg width="120" height="120" viewBox="0 0 100 100"><rect x="25" y="25" width="50" height="40" stroke="#3b82f6" fill="none" stroke-width="3"/><circle cx="45" cy="40" r="8" fill="#fbbf24"/><path d="M70 30 L85 10" stroke="#1e293b" stroke-width="4"/></svg>`;
            } else if(mode === 'story') {
                document.getElementById('voice-options').classList.remove('hidden');
                logoSvg.innerHTML = `<div class="relative"><svg width="120" height="120" viewBox="0 0 100 100" class="orbit-slow"><circle cx="50" cy="50" r="20" fill="#fbbf24"/><circle cx="15" cy="50" r="6" fill="#3b82f6"/><circle cx="85" cy="50" r="4" fill="#ef4444"/></svg></div>`;
                loadVoices();
            }
        };

        // Auth
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                userName = user.displayName.split(' ')[0];
                document.getElementById('user-name-display').innerText = `नमस्ते, ${userName}`;
                syncHistory(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        // TTS Voices
        let voices = [];
        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('hi') || v.lang.includes('en'));
            const select = document.getElementById('voice-select');
            select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        // Core AI Engine
        async function runSYK() {
            const prompt = promptInput.value.trim();
            if(!prompt) return;
            promptInput.value = '';
            document.getElementById('logo-center').style.display = 'none';
            
            appendMsg('user', prompt);
            const loadId = appendLoading();

            try {
                if(currentMode === 'image') {
                    const size = document.getElementById('size-select').value;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${GEMINI_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1, aspect_ratio: size } })
                    });
                    const data = await res.json();
                    const img = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    removeLoading(loadId);
                    appendImg(img, prompt);
                    save('image', prompt, img);
                } else {
                    const sys = `तुम्हारा नाम SYK AI (Star By King) है। तुम्हें शिवम यादव ने बनाया है। तुम शिवम से बात कर रहे हो। अपनी पहचान गोपनीय रखो और सिर्फ 'Star By King' बताओ।`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{parts:[{text:prompt}]}], systemInstruction: {parts:[{text:sys}]} })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    removeLoading(loadId);
                    
                    if(currentMode === 'story') {
                        appendStory(reply);
                        save('story', prompt, reply);
                    } else {
                        appendMsg('bot', reply);
                        save('chat', prompt, reply);
                    }
                }
            } catch (e) {
                removeLoading(loadId);
                appendMsg('bot', `क्षमा करें ${userName}, कुछ तकनीकी समस्या आई है: ${e.message}`);
            }
        }

        sendBtn.onclick = runSYK;

        // Message UI
        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2`;
            div.innerHTML = `<div class="p-4 rounded-2xl max-w-[85%] text-sm ${role === 'user' ? 'blue-gradient text-white shadow-lg' : 'bg-white border text-slate-800'}">${text.replace(/\n/g, '<br>')}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendImg(url, p) {
            const div = document.createElement('div');
            div.className = "flex justify-start animate-in zoom-in-95";
            div.innerHTML = `<div class="bg-white border p-2 rounded-2xl max-w-[90%] shadow-lg">
                <img src="${url}" class="rounded-xl w-full">
                <div class="flex justify-between p-2"><span class="text-[10px] text-slate-400 italic">${p}</span><a href="${url}" download="SYK.png" class="text-blue-600"><i data-lucide="download" class="w-4 h-4"></i></a></div>
            </div>`;
            chatContainer.appendChild(div);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendStory(text) {
            const id = 's' + Date.now();
            const div = document.createElement('div');
            div.className = "flex justify-start";
            div.innerHTML = `<div class="bg-blue-50 border border-blue-100 p-5 rounded-3xl w-full max-w-[90%] shadow-sm">
                <div class="flex gap-3 mb-3">
                    <button onclick="playAudio('${id}')" class="p-3 blue-gradient text-white rounded-full"><i data-lucide="play" class="w-4 h-4"></i></button>
                    <div><p class="text-xs font-bold text-blue-900">कहानी सुनाने वाला</p><p class="text-[9px] text-blue-400">प्ले करें</p></div>
                </div>
                <div id="t-${id}" class="text-sm text-slate-700 leading-relaxed">${text.replace(/\n/g, '<br>')}</div>
            </div>`;
            chatContainer.appendChild(div);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        window.playAudio = (id) => {
            const txt = document.getElementById('t-'+id).innerText;
            const u = new SpeechSynthesisUtterance(txt);
            u.voice = voices[document.getElementById('voice-select').value];
            u.pitch = document.getElementById('mood-select').value;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        };

        function appendLoading() {
            const id = 'l' + Date.now();
            const div = document.createElement('div'); div.id = id;
            div.innerHTML = `<div class="flex gap-2 p-4 text-[10px] font-bold text-blue-400 animate-pulse uppercase tracking-widest">Star is processing...</div>`;
            chatContainer.appendChild(div);
            return id;
        }
        function removeLoading(id) { document.getElementById(id)?.remove(); }

        async function save(type, p, r) {
            if(auth.currentUser) await addDoc(collection(db, "users", auth.currentUser.uid, "history"), { type, p, r, t: Date.now() });
        }

        function syncHistory(uid) {
            onSnapshot(collection(db, "users", uid, "history"), (s) => {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                s.docs.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = "p-3 hover:bg-slate-50 rounded-xl cursor-pointer text-[10px] font-bold border border-transparent hover:border-slate-100";
                    el.innerHTML = `<p class="truncate text-slate-600">${d.p}</p><p class="text-blue-400 text-[8px] uppercase">${d.type}</p>`;
                    el.onclick = () => {
                        document.getElementById('logo-center').style.display = 'none';
                        if(d.type === 'image') appendImg(d.r, d.p);
                        else if(d.type === 'story') appendStory(d.r);
                        else { appendMsg('user', d.p); appendMsg('bot', d.r); }
                    };
                    list.prepend(el);
                });
            });
        }

        lucide.createIcons();
        document.getElementById('menu-btn').onclick = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.add('-translate-x-full');
    </script>
</body>
</html>
